<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="styles/output.css" />
    <link
      rel="stylesheet"
      type="text/css"
      href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/regular/style.css"
    />
    <link
      rel="stylesheet"
      type="text/css"
      href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/light/style.css"
    />
    <link
      rel="stylesheet"
      type="text/css"
      href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/fill/style.css"
    />
  </head>
  <body>
    <!--  Main Container -->
    <div class="flex justify-center items-center min-h-screen bg-slate-100">
      <!--  Product Container -->

      <div
        class="flex flex-col p-6 m-3 space-y-10 bg-white rounded-2xl shadow-2xl md:flex-row md:space-y-0 md:space-x-10 md:m-0 md:p-16"
      >
        <!-- Product Image -->
        <div>
          <img
            src="/src/img/a30964f0-6ffa-4cab-a10e-3dbb7aeffae0.png"
            alt="Headphone"
            class="mx-auto w-60 hover:scale-105 duration-200"
          />
        </div>

        <!-- Product Details -->
        <div class="flex flex-col space-y-6">
          <!--Product Label & Description-->
          <div class="flex flex-col mb-4 space-y-3 text-center md:text-left">
            <!--Label-->
            <div
              class="inline-block self-center px-3 py-1 text-sm text-white bg-black rounded-full md:self-start"
            >
              Free Shipping
            </div>
            <!--  Description -->
            <div class="max-w-sm text-2xl font-medium">
              Razer Kraken V3 X Wired Gaming Headset
            </div>

            <!--Pricing-->
            <div class="flex flex-col mb-4 space-y-1 text-center md:text-left">
              <p class="line-through text-gray-400">$799</p>
              <p class="text-5xl font-bold">$499</p>
              <p class="text-sm text-gray-400">
                Offer valid till 3 july or as long as the stock is available
              </p>
            </div>

            <!-- Instrucutors button ui design
            <div class="group">
              <button
                class="w-full transition-all duration-100 border-b-8 bg-blue-700 border-blue-700 group-hover:border-t-8 group-hover:border-b-0 rounded-lg"
              >
                <div
                  class="px-6 py-4 bg-blue-500 text-white rounded-lg group-hover:bg-blue-700 duration-100"
                >
                  Add to Cart
                </div>
              </button>
            </div>
             Button End -->

            <!-- Button 2n-->
            <div
              class="flex justify-center items-center text-white group bg-blue-700 h-14 width-full rounded-lg"
            >
              <button
                class="bg-blue-500 w-full py-4 rounded-lg -translate-y-2 hover:bg-blue-700 duration-200 group-hover:mt-4"
              >
                Add to cart
              </button>
            </div>
            <!--  Button 2nd End -->
          </div>

          <!-- Stock -->
          <div class="flex items-center space-x-3 group">
            <div class="w-3 h-3 bg-green-400 rounded-full animate-ping"></div>

            <div class="text-sm">50 pcs. remaining in stock</div>
          </div>

          <!-- Bottom buttons container -->
          <div
            class="flex flex-col space-y-4 md:flex-row md:space-y-0 space-x-4"
          >
            <button
              class="flex items-center justify-center space-x-2 border-2 border-gray-200 rounded-lg w-full shadow-xsm px-5 py-3 hover:bg-opacity-30 hover:shadow-lg hover:-translate-y-0.5 transition-all duration-200"
            >
              <i class="ph-light ph-shopping-bag-open text-2xl"></i>
              <span>Add to cart</span>
            </button>

            <button
              class="flex items-center justify-center space-x-2 border-2 border-gray-200 rounded-lg w-full shadow-xsm px-5 py-3 hover:bg-opacity-30 hover:shadow-lg hover:-translate-y-0.5 transition-all duration-200"
            >
              <i class="ph-light ph-heart text-2xl"></i>
              <span>Add to wishlist</span>
            </button>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
